name: Vercel Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Vercel configuration
        id: vercel_config
        shell: bash
        run: |
          if [[ -n "${VERCEL_ORG_ID}" && -n "${VERCEL_PROJECT_ID}" && -n "${VERCEL_TOKEN}" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip deploy when Vercel secrets are missing
        if: steps.vercel_config.outputs.ready != 'true'
        run: |
          echo "Skipping Vercel deploy because required secrets are missing."
          echo "Set VERCEL_ORG_ID, VERCEL_PROJECT_ID, and VERCEL_TOKEN to enable deploys."

      - name: Setup Node.js
        if: steps.vercel_config.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        if: steps.vercel_config.outputs.ready == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        if: steps.vercel_config.outputs.ready == 'true'
        run: vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build Vercel artifacts
        if: steps.vercel_config.outputs.ready == 'true'
        run: vercel build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy to Vercel
        if: steps.vercel_config.outputs.ready == 'true'
        run: vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}"
