version: "3.9"
services:
  orchestrator:
    build: ./orchestrator
    ports:
      - "8000:8000"
    environment:
      - CREWAI_SERVICE_URL=http://crewai-service:8001
      - VERCEL_SERVICE_URL=http://vercel-service:8002
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - crewai-service
      - vercel-service
    volumes:
      - ./shared.db:/app/shared.db

  crewai-service:
    build: ./crewai-service
    ports:
      - "8001:8001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./shared.db:/app/shared.db

  vercel-service:
    build: ./vercel-service
    ports:
      - "8002:8002"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
